<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container">
    <h1>Todos</h1>
    <a class="btn btn-primary mb-3" th:href="@{/todos/new}">New Todo</a>
    <table class="table">
        <thead><tr><th>Title</th><th>Status</th><th>Due</th><th>Actions</th></tr></thead>
        <tbody>
        <tr th:each="todo : ${todos}">
            <td th:text="${todo.title}"></td>
            <td th:text="${todo.status}"></td>
            <td th:text="${todo.dueDate}"></td>
            <td>
                <a th:href="@{'/todos/' + ${todo.id}}" class="btn btn-sm btn-info">View</a>
                <a th:href="@{'/todos/' + ${todo.id} + '/edit'}" class="btn btn-sm btn-secondary">Edit</a>
                <form th:action="@{'/todos/' + ${todo.id} + '/delete'}" method="post" style="display:inline">
                    <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
