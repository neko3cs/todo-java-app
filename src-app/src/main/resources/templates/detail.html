<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container">
    <h1 th:text="${todo.title}"></h1>
    <p><strong>Status:</strong> <span th:text="${todo.status}"></span></p>
    <p><strong>Due:</strong> <span th:text="${todo.dueDate}"></span></p>
    <p><strong>Description:</strong></p>
    <p th:text="${todo.description}"></p>
    <a class="btn btn-secondary" th:href="@{/todos}">Back</a>
    <a th:href="@{'/todos/' + ${todo.id} + '/edit'}" class="btn btn-primary">Edit</a>
</div>
</body>
</html>
