<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container">
    <h1 th:text="${todo.id} == null ? 'New Todo' : 'Edit Todo'"></h1>
    <form th:action="${todo.id} == null ? @{/todos} : @{/todos/{id}(id=${todo.id})}" th:object="${todo}" method="post">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input class="form-control" type="text" th:field="*{title}" />
            <div th:if="${#fields.hasErrors('title')}" class="text-danger" th:errors="*{title}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" th:field="*{description}"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Due Date</label>
            <input class="form-control" type="date" th:field="*{dueDate}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" th:field="*{status}">
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Priority</label>
            <input class="form-control" type="number" th:field="*{priority}" />
        </div>
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-secondary" th:href="@{/todos}">Cancel</a>
    </form>
</div>
</body>
</html>
