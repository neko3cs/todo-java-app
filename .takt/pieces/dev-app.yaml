name: dev-app
description: Java 17 / Spring Boot MVC (Gradle) 自律開発ピース
max_movements: 50
initial_movement: design

personas:
  architect:
    prompt: "Java/Spring Boot senior architect: design clean Spring MVC applications"
  developer:
    prompt: "Java 17 / Spring Boot developer: implement MVC, Thymeleaf, PostgreSQL"
  reviewer:
    prompt: "Senior engineer reviewer: check maintainability, security, and Gradle conventions"
  tester:
    prompt: "QA engineer: run ./gradlew test and validate DB connectivity"
  reporter:
    prompt: "Documentation expert: convert Mermaid diagrams to PNG with mmdc and embed into reports"

policies:
  language: "Java 17"
  build: "Gradle"
  framework: "Spring Boot MVC (Thymeleaf)"
  db: "PostgreSQL 17"
  ui_guideline: "Google Todo-like minimal UI"
  layout: "/src-app for app code; /docs for documentation"
  app-policy:
    language: "Java 17"
    build: "Gradle"
    framework: "Spring Boot MVC (Thymeleaf)"
    db: "PostgreSQL 17"
    ui_guideline: "Google Todo-like minimal UI"
    layout: "/src-app for app code; /docs for documentation"

knowledge:
  project-layout: project-structure
  customer-reqs: requirements

movements:
  - name: design
    persona: architect
    knowledge: [project-layout, customer-reqs]
    policy: app-policy
    edit: true
    allowed_tools: [Read, Glob, Bash, Write]
    timeout_minutes: 120
    on_failure: "ABORT"
    instruction: |
      顧客要求に基づき、/docs/app-design.md に設計書を作成してください。
      - Mermaid 記法で ER図、画面遷移図、シーケンス図を記述。
      - 各図は別ファイル（*.mmd）としても保存すること。
      - Gradle のプロジェクト構成（依存関係）を決定すること。
    rules:
      - condition: "設計書と *.mmd ファイルが生成された"
        next: report
      - condition: "要件不明"
        next: ABORT

  - name: report
    persona: reporter
    policy: app-policy
    edit: true
    allowed_tools: [Read, Glob, Bash, Write]
    timeout_minutes: 30
    on_failure: "ABORT"
    instruction: |
      1. `/docs` 内の *.mmd ファイルを `mmdc` コマンドで PNG 化してください。
      2. 生成された PNG を `app-design.md` に埋め込み、見栄えを整えてください。
    rules:
      - condition: "設計書の PNG 埋め込みとドキュメント整形が完了した"
        next: implement
      - condition: "画像変換に失敗"
        next: ABORT

  - name: implement
    persona: developer
    knowledge: [project-layout, customer-reqs]
    policy: app-policy
    edit: true
    allowed_tools: [Read, Glob, Bash, Write]
    timeout_minutes: 240
    on_failure: "ABORT"
    instruction: |
      /docs/app-design.md に基づき、/src-app に Gradle プロジェクトを構築・実装してください。
      必ず Gradle Wrapper (`gradlew`) を含めて作成すること。
      実行要件: JDK 17 がインストールされていること、ネットワークアクセスが依存解決に必要な場合があることを明記してください。
    rules:
      - condition: "ビルド可能な全コードの実装が完了した"
        next: review

  - name: review
    persona: reviewer
    knowledge: [project-layout, customer-reqs]
    edit: true
    allowed_tools: [Read, Glob, Edit, Bash]
    timeout_minutes: 60
    on_failure: "ABORT"
    instruction: "実装されたコードと Gradle 設定をレビューし、必要なら修正してください。"
    rules:
      - condition: "レビューをパスした"
        next: test
      - condition: "要修正"
        next: implement

  - name: test
    persona: tester
    knowledge: [project-layout]
    edit: true
    allowed_tools: [Read, Glob, Bash]
    timeout_minutes: 30
    on_failure: "ABORT"
    instruction: "`./gradlew test` を実行し、全テストをパスさせてください。"
    rules:
      - condition: "テスト成功"
        next: COMPLETE
      - condition: "テスト失敗"
        next: implement
