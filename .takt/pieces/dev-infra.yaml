name: dev-infra
description: Google Cloud (Terraform) IaC 専門開発ピース
max_movements: 50
initial_movement: design

personas:
  implementer:
    prompt: "Terraform and Google Cloud implementer: author HCL and validate resources with gcloud"
  reviewer:
    prompt: "Terraform reviewer: check security, maintainability, and GCP best practices"
  tester:
    prompt: "IaC QA specialist: run terraform plan and verify closed-network configuration"
  reporter:
    prompt: "Documentation expert: embed Mermaid diagrams into Markdown reports"

policies:
  language: "Terraform"
  build: "N/A"
  framework: "Google Cloud Platform / Terraform"
  db: "Cloud SQL (PostgreSQL 17, Private IP)"
  ui_guideline: "n/a"
  layout: "/src-infra for Terraform .tf files"
  infra-policy:
    language: "Terraform"
    build: "N/A"
    framework: "Google Cloud Platform / Terraform"
    db: "Cloud SQL (PostgreSQL 17, Private IP)"
    ui_guideline: "n/a"
    layout: "/src-infra for Terraform .tf files"

knowledge:
  project-layout: project-structure
  customer-reqs: requirements

movements:
  - name: design
    persona: implementer
    knowledge: [project-layout, customer-reqs]
    policy: infra-policy
    edit: true
    allowed_tools: [Read, Glob, Grep, Bash, WebSearch, WebFetch, Write]
    timeout_minutes: 120
    on_failure: "ABORT"
    instruction: |
      以下のアーキテクチャに基づき、Terraformの構成案を作成してください。
      設計書は Markdown 形式で出力し、Mermaid記法（flowchart, graph, sequenceなど）を用いて図を記述してください。
      図の記述は *.mmd ファイルとして別途保存してください。

      1. Load Balancer + WAF (Cloud Armor)
      2. 閉域網内の Cloud Run
      3. 閉域網内の Cloud SQL (PostgreSQL 17)
      4. Cloud SQL Admin API の有効化設定

      設計書と .mmd ファイルの出力が完了したら、次のフェーズに進んでください。
    rules:
      - condition: "設計案とMermaid図がMarkdownファイルとして出力された"
        next: report
      - condition: "情報不足で設計できない"
        next: ABORT

  - name: report
    persona: reporter
    knowledge: [project-layout, customer-reqs]
    policy: infra-policy
    edit: true
    allowed_tools: [Read, Glob, Bash, Write]
    timeout_minutes: 30
    on_failure: "ABORT"
    install_hint: |
      If `mmdc` is not available, prefer containerized execution in CI or developer machines. Examples:
      - POSIX/CI: `docker run --rm -v "$(pwd)":/data minified/mmdc mmdc -i input.mmd -o output.png`
        Ensure the CI job uses the repository workspace as the container volume (e.g. `$CI_WORKSPACE` mounted to `/data`).
      - Windows (PowerShell): adjust volume mapping, e.g. `docker run --rm -v ${PWD}:/data minified/mmdc mmdc -i input.mmd -o output.png`.
      - Alternatively, install globally via npm: `npm install -g @mermaid-js/mermaid-cli`.
      Note: ensure CI provides necessary environment variables and that Docker is available in the runner.
    instruction: |
      designフェーズで作成された設計書とMermaid図（*.mmdファイル）を受け取りました。

      1. `.mmd` ファイルが存在すれば、`@mermaid-js/mermaid-cli` を使用して PNG 画像を生成してください。
         コマンド例: `mmdc -i input.mmd -o output.png`
         もし `mmdc` が見つからない場合は `npm install -g @mermaid-js/mermaid-cli` を実行してインストールしてください。
      2. 生成されたPNG画像をMarkdown形式の設計書に適切に埋め込んでください。
      3. 最終的な設計書ファイルを `design-report.md` として保存してください。
    rules:
      - condition: "Mermaid図がPNG化され、設計書に埋め込まれた最終レポートが生成された"
        next: implement
      - condition: "Mermaid図の生成や埋め込みに失敗した"
        next: ABORT

  - name: implement
    persona: implementer
    knowledge: [project-layout, customer-reqs]
    policy: infra-policy
    edit: true
    allowed_tools: [Read, Glob, Grep, Bash, Write]
    timeout_minutes: 240
    on_failure: "ABORT"
    instruction: "設計に基づき、Terraformコード (.tfファイル) を作成・修正してください。"
    rules:
      - condition: "コードの記述が完了した"
        next: review

  - name: review
    persona: reviewer
    knowledge: [project-layout, customer-reqs]
    policy: infra-policy
    edit: true
    allowed_tools: [Read, Glob, Grep, Bash, Edit]
    timeout_minutes: 60
    on_failure: "ABORT"
    instruction: |
      実装されたコードをレビューしてください。特に以下の点を重点的にチェックします：
      - Cloud Run/SQL が意図せず公開されていないか
      - WAFの設定は適切か
      - PostgreSQLのバージョンは17か
      修正が必要な場合は直接コードを修正するか、具体的な指示を出してください。
    rules:
      - condition: "レビューをパスし、コードが最適化された"
        next: test
      - condition: "大幅な再設計が必要"
        next: implement

  - name: test
    persona: tester
    knowledge: [project-layout, customer-reqs]
    policy: infra-policy
    edit: true
    allowed_tools: [Read, Glob, Grep, Bash]
    timeout_minutes: 30
    on_failure: "ABORT"
    instruction: |
      `terraform plan` を実行して構成の整合性を確認してください。
      また、セキュリティ設定（隔離環境）がポリシーに準拠しているか静的解析やコマンドで検証してください。
    rules:
      - condition: "すべてのテスト・検証をパスした"
        next: COMPLETE
      - condition: "修正すべき問題が見つかった"
        next: implement
